---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-podinfo
  namespace: flux-system
spec:
  path: ./kubernetes/apps/default/podinfo/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false # no flux ks dependents
  interval: 3m0s
  retryInterval: 1m0s
  timeout: 5m

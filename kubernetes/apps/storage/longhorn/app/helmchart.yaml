---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: longhorn
  namespace: storage
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 5m

  install:
    createNamespace: false
    remediation:
      retries: 5

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5

  values:
    persistence:
      defaultClassReplicaCount: 2
    defaultSettings:
      defaultReplicaCount: 2
    enablePSP: false
    ingress:
      enabled: true
      ingressClassName: "nginx"
      host: "longhorn.cudabu.io"
      tls: true
      annotations:
        hajimari.io/icon: "iconoir:database-backup"
        hajimari.io/enable: "true"
        hajimari.io/appName: Longhorn
